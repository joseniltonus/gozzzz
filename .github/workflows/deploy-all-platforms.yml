name: Deploy App (Web + OTA)

# Automatic: every push to `main` runs validation, then Vercel (web) + EAS OTA (iOS/Android)
# in parallel. No extra manual deploy step — only merge or push to `main`.
# Optional: run manually from Actions → "Run workflow".
#
# Web-only escape hatch: include `[skip ota]` (or `[web only]`) in the commit message
# to publish only the Vercel build and skip the OTA job for that push.
# Manual web-only via UI: dispatch this workflow with `skip_ota=true`.
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_ota:
        description: "Skip the OTA (iOS/Android) job and deploy web only"
        type: boolean
        default: false

# If several commits land on `main` quickly, cancel older in-flight runs so production
# always matches the latest commit (saves CI time and avoids stale deploys).
concurrency:
  group: deploy-app-web-ota-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-science:
    name: Validate science references
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Validate references
        run: npm run validate:science

  deploy-web:
    name: Deploy Web to Vercel
    needs: validate-science
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Verify Vercel project access
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing required Vercel secrets: VERCEL_TOKEN, VERCEL_PROJECT_ID"
            echo "Tip: VERCEL_ORG_ID is optional for some Hobby accounts — leave blank if unsure."
            exit 1
          fi
          npm run vercel:verify-project

      # Resolve Supabase web env: prefer GitHub Secrets, fall back to the canonical
      # public values for project ref `virxgaxsnxdqjwyvqqme` (GoZzzzz). The anon key
      # is intentionally public — Expo exposes any `EXPO_PUBLIC_*` var in the bundle
      # that ships to the browser anyway. Hardcoding it as a fallback avoids prod
      # outages when a Secret gets accidentally cleared or holds a stale value.
      - name: Resolve web build env
        id: web_env
        env:
          SECRET_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SECRET_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          DEFAULT_URL="https://virxgaxsnxdqjwyvqqme.supabase.co"
          DEFAULT_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpcnhnYXhzbnhkcWp3eXZxcW1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjUyNjQsImV4cCI6MjA5MzAwMTI2NH0.9UNNeP5TH3tkLWHJH0nKUTXj6wghjlM4qSnx-vByJEY"

          RESOLVED_URL="${SECRET_SUPABASE_URL:-$DEFAULT_URL}"
          RESOLVED_ANON="${SECRET_SUPABASE_ANON_KEY:-$DEFAULT_ANON}"

          # Reject obvious legacy values (old project ref) so a stale secret can't
          # silently override the canonical one and ship a broken bundle.
          if echo "$RESOLVED_URL" | grep -q "cmekyhdkenoymfftwjod"; then
            echo "::warning::Stale Supabase URL secret detected; using canonical fallback."
            RESOLVED_URL="$DEFAULT_URL"
            RESOLVED_ANON="$DEFAULT_ANON"
          fi

          echo "Using Supabase URL: $RESOLVED_URL"
          echo "EXPO_PUBLIC_SUPABASE_URL=$RESOLVED_URL" >> "$GITHUB_ENV"
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$RESOLVED_ANON" >> "$GITHUB_ENV"

      - name: Build web bundle
        env:
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ] || [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "Resolved web build env is empty (this should not happen)."
            exit 1
          fi
          npm run build:web

      # `dist/` está no .gitignore — o Vercel CLI não envia essa pasta. Um `vercel deploy`
      # na raiz força rebuild na nuvem (sem as EXPO_PUBLIC_* do GitHub) → produção desatualizada.
      # Preparamos `dist/` com .vercel/project.json e fazemos deploy a partir daí (bundle do CI).
      - name: Prepare static deploy (dist + Vercel project link)
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: node scripts/prepare-vercel-dist-deploy.mjs

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing required Vercel secret: VERCEL_TOKEN"
            exit 1
          fi
          cd dist
          npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"

  publish-ota:
    name: Publish OTA update (iOS + Android)
    needs: validate-science
    # Skip OTA when:
    #  - manual dispatch with skip_ota=true, OR
    #  - push commit message contains [skip ota] or [web only]
    if: >-
      !(github.event_name == 'workflow_dispatch' && inputs.skip_ota) &&
      !contains(github.event.head_commit.message, '[skip ota]') &&
      !contains(github.event.head_commit.message, '[web only]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Verify EAS production variables (Expo dashboard)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing required secret: EXPO_TOKEN"
            exit 1
          fi
          npm run verify:eas-env

      - name: Publish production OTA
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing required secret: EXPO_TOKEN"
            exit 1
          fi
          npx eas-cli update \
            --branch production \
            --environment production \
            --non-interactive \
            --message "Auto update from main (${GITHUB_SHA})"
