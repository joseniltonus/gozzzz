name: Science Reference Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-science:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate science references policy
        run: npm run validate:science
