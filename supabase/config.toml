# https://supabase.com/docs/guides/functions/function-configuration
# O cron do GitHub chama esta função com Authorization: Bearer <PRIVACY_PROCESSOR_SECRET>,
# não com JWT de utilizador — verify_jwt tem de estar desligado.
[functions.process-privacy-requests]
verify_jwt = false

# Webhook do Kiwify chama com assinatura HMAC própria (não JWT). A função
# valida o secret no handler — verify_jwt do Supabase precisa ficar OFF.
[functions.kiwify-webhook]
verify_jwt = false
